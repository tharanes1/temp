worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 8192;
  use epoll;
  multi_accept on;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;

  # ──────────────────────────────────────────────────────────────
  # Required by Socket.IO sticky-session handshake (spec §2)
  # ──────────────────────────────────────────────────────────────
  upstream cravix_api {
    ip_hash;
    server api-gateway:3000;
    # In production add: server api-gateway-2:3000; ... up to api-gateway-8:3000;
  }

  upstream cravix_socket {
    ip_hash;
    server api-gateway:5000;
    # Production: socket-gateway-1..8:5000
  }

  # rate-limit: 100 req / minute / IP — Redis-backed limit also enforced in-app
  limit_req_zone $binary_remote_addr zone=api_rl:10m rate=100r/m;

  # Hide server token
  server_tokens off;

  server {
    listen 80;
    server_name _;

    # HTTP REST
    location /api/ {
      limit_req zone=api_rl burst=20 nodelay;
      proxy_pass http://cravix_api;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID      $request_id;
      proxy_read_timeout    30s;
      proxy_connect_timeout 5s;
    }

    # Socket.IO  ── long-lived WebSocket upgrade
    location /socket.io/ {
      proxy_pass http://cravix_socket;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;
    }

    location /health {
      proxy_pass http://cravix_api/health;
      access_log off;
    }
  }
}
