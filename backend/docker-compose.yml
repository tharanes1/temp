services:
  postgres:
    image: postgres:16-alpine
    container_name: cravix-postgres
    environment:
      POSTGRES_USER: cravix_user
      POSTGRES_PASSWORD: cravix_dev_pw
      POSTGRES_DB: cravix
    ports: ['5432:5432']
    volumes:
      - cravix-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cravix_user -d cravix']
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: cravix-pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cravix_user:cravix_dev_pw@postgres:5432/cravix
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 100
      ADMIN_USERS: cravix_user
    ports: ['6432:5432']

  redis:
    image: redis:7-alpine
    container_name: cravix-redis
    command: redis-server --appendonly yes --maxmemory-policy allkeys-lru
    ports: ['6379:6379']
    volumes:
      - cravix-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: cravix-nginx
    depends_on: [api-gateway]
    ports: ['8080:80']
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/api-gateway.Dockerfile
    container_name: cravix-api-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cravix_user:cravix_dev_pw@pgbouncer:5432/cravix?connection_limit=5&pool_timeout=20
      REDIS_URL: redis://redis:6379
    ports: ['3000:3000']

  socket-gateway:
    build:
      context: .
      dockerfile: infra/docker/socket-gateway.Dockerfile
    container_name: cravix-socket-gateway
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      SOCKET_PORT: 5000
    ports: ['5000:5000']

  workers:
    build:
      context: .
      dockerfile: infra/docker/workers.Dockerfile
    container_name: cravix-workers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cravix_user:cravix_dev_pw@pgbouncer:5432/cravix?connection_limit=5&pool_timeout=20
      REDIS_URL: redis://redis:6379

volumes:
  cravix-pg-data:
  cravix-redis-data:
